version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: queryconnect-db
    environment:
      MYSQL_DATABASE: product_community_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queryconnect-backend
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://db:3306/product_community_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      SERVER_PORT: 8081
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: queryconnect-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
